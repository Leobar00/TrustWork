version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trustwork-db
    environment:
      POSTGRES_USER: trustwork
      POSTGRES_PASSWORD: trustwork_dev_password
      POSTGRES_DB: trustwork
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustwork"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trustwork-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustwork-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://trustwork:trustwork_dev_password@postgres:5432/trustwork
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_openai_key_here}
      WDK_API_KEY: ${WDK_API_KEY:-your_wdk_key_here}
      WDK_NETWORK: ${WDK_NETWORK:-testnet}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trustwork-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trustwork-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - trustwork-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  trustwork-network:
    driver: bridge
